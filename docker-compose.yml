services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./db.sqlite3:/app/db.sqlite3
    ports:
      - "127.0.0.1:8000:8000"   # local-only, for troubleshooting; public access goes through cloudflared

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      - web
